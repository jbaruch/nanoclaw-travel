name: Test

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          # Mirrors the NanoClaw agent container's interpreter (nanoclaw-agent,
          # node:24-slim / Debian bookworm -> Python 3.11.2) where the skill
          # scripts execute. Scanner-untracked by design: renovate.json disables
          # the github-actions python dep so CI never tests ahead of production.
          # Renewal: when the container's Dockerfile base image moves, re-verify
          # with `docker run --rm --entrypoint python3 nanoclaw-agent:latest
          # --version` and bump this pin + the renovate.json rule description.
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt

      # Lint runs before tests per `jbaruch/coding-policy: code-formatting`
      # — catches style/import issues fast and cheaply before pytest
      # boots fixtures.
      - name: Lint (ruff)
        run: |
          python -m ruff check tests/ skills/
          python -m ruff format --check tests/ skills/

      # Type check runs before tests per `jbaruch/coding-policy:
      # language-diagnostics` — gates at zero pyright findings. `--warnings`
      # makes warnings (not just errors) fail the step's exit code.
      - name: Type check (pyright)
        run: python -m pyright --warnings skills/ tests/

      - name: Pytest
        run: python -m pytest
