name: Review & Publish Tile

permissions:
  id-token: write
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Required by jbaruch/coding-policy/.github/actions/skill-review:
          # the action runs `git diff $BEFORE..HEAD` to find changed skills.
          fetch-depth: 0

      - uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      # Reviews only the skills whose files changed in this push.
      - name: Skill review (changed only)
        uses: jbaruch/coding-policy/.github/actions/skill-review@b63f13ea80e92c784cf71fc74ed98f71b15f2aa2 # v0.x
        with:
          threshold: '85'

      - name: Lint tile
        run: tessl tile lint .

      # Stamps the top un-headed `### ` CHANGELOG blocks with the
      # `## <version> — <date>` heading the publish step is about to assign,
      # per jbaruch/coding-policy: context-artifacts "CHANGELOG Hygiene".
      # Must run immediately before patch-version-publish.
      - name: Stamp CHANGELOG
        uses: jbaruch/coding-policy/.github/actions/stamp-changelog@de18c1b923ed55afed7fb4c96efe35926c0e7bbf # main

      - uses: tesslio/patch-version-publish@v1
        with:
          token: ${{ secrets.TESSL_TOKEN }}
