[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"

[tool.ruff]
# Scoped to tests/ in v0.1.0. Production code lints land in the PR
# that adds production code — keeps lint-config scope coherent with
# what's actually in tree, per `jbaruch/coding-policy: ci-safety`
# (don't smuggle CI changes for things outside this PR's stated
# scope).
src = ["tests"]
include = ["tests/**/*.py"]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
